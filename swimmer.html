<!DOCTYPE html>
<html>

<head>
  <title>Swimmer Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1><a href="index.html">SwCan</a></h1>

<div id="profile"></div>

<script src="data.js"></script>

<script>

function timeToSeconds(t) {
  if (!t) return 9999;

  const parts = t.split(":").map(Number);

  if (parts.length === 2) {
    return parts[0] * 60 + parts[1];
  }

  return Number(t);
}

const params = new URLSearchParams(window.location.search);
const swimmerId = params.get("id");

const swimmer = swimmers.find(s => s.id === swimmerId);

const profile = document.getElementById("profile");

if (!swimmer) {

  profile.innerHTML = "<h1>Swimmer not found</h1>";

} else {

  let standardsHTML = "";

  for (const event in swimmer.bestTimes) {

    const time = swimmer.bestTimes[event];
    const std = standards[event];

    if (!std) continue;

    const t = timeToSeconds(time);

    let level = "Below Standard";

    if (t <= timeToSeconds(std.AAA)) level = "AAA";
    else if (t <= timeToSeconds(std.AA)) level = "AA";
    else if (t <= timeToSeconds(std.A)) level = "A";

    standardsHTML += `
      <div class="card">
        <h3>${event}</h3>
        <p>Time: ${time}</p>
        <p>Standard: ${level}</p>
      </div>
    `;
  }

  profile.innerHTML = `
  
    <h1>${swimmer.name}</h1>

    <p><strong>Club:</strong> ${swimmer.club}</p>
    <p><strong>Birth Year:</strong> ${swimmer.year}</p>
    <p><strong>SW CAN ID:</strong> ${swimmer.id}</p>

    <hr>

    <h2>🏆 Standards Progress</h2>
    ${standardsHTML}

    <hr>

    <h2>🏁 Meets</h2>

    ${
      swimmer.meets?.length
        ? swimmer.meets.map(meet => `
            <div class="card">
              <h3>${meet.name}</h3>
              <p>${meet.date}</p>

              ${meet.events.map(e => `
                <p>${e.event}: ${e.time} (Rank ${e.rank})</p>
              `).join("")}
            </div>
          `).join("")
        : "<p>No meets yet</p>"
    }

  `;

}

</script>

</body>
</html>
