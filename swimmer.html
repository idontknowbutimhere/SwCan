<!DOCTYPE html>
<html>

<head>
  <title>Swimmer Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1><a href="index.html">SwCan</a></h1>

<div id="profile"></div>

<script src="data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const swimmerId = params.get("id");

const swimmer = swimmers.find(s => s.id === swimmerId);

const profile = document.getElementById("profile");

if (!swimmer) {

  profile.innerHTML = "<h1>Swimmer not found</h1>";

} else {

  profile.innerHTML = `
    <h1>${swimmer.name}</h1>

    <p><strong>Club:</strong> ${swimmer.club}</p>
    <p><strong>Year:</strong> ${swimmer.year}</p>
    <p><strong>ID:</strong> ${swimmer.id}</p>

    <hr>

    <h2>🏁 Meets</h2>

    ${
      swimmer.meets.map(meet => `
        <div class="card">
          <h3>${meet.name}</h3>
          <p>${meet.date}</p>
          <p><em>Source: ${meet.source}</em></p>

          ${meet.events.map(e => `
            <p>${e.event}: ${e.time} (Rank ${e.rank})</p>
          `).join("")}
        </div>
      `).join("")
    }

  `;
}

</script>

</body>
</html>
