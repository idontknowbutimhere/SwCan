<!DOCTYPE html>
<html>

<head>
  <title>SwCan</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1><a href="index.html">SwCan</a></h1>

<input id="search" placeholder="Search swimmer..." />

<div style="margin: 10px 0;">
  <a href="standards.html">
    <button>📊 Standards Sheets</button>
  </a>
</div>

<div id="results"></div>

<script src="data.js"></script>

<script>
const search = document.getElementById("search");
const results = document.getElementById("results");

search.addEventListener("input", () => {

  const query = search.value.toLowerCase();
  results.innerHTML = "";

  swimmers
    .filter(swimmer =>
      swimmer.name.toLowerCase().includes(query)
    )
    .forEach(swimmer => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h2>
          <a href="swimmer.html?id=${swimmer.id}">
            ${swimmer.name}
          </a>
        </h2>
        <p>${swimmer.club} (${swimmer.year})</p>
        <p>SW CAN ID: ${swimmer.id}</p>
      `;

      results.appendChild(div);

    });

});
</script>

</body>
</html>
