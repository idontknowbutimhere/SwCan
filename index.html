<!DOCTYPE html>
<html>
<head>
  <title>SwCan</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1><a href="index.html">SwCan</a></h1>

<input id="search" placeholder="Search swimmer..." />

<div id="results"></div>

<script>
const search = document.getElementById("search");
const results = document.getElementById("results");

let swimmers = [];

// 🔥 LIVE BACKEND DATA ONLY
fetch("http://127.0.0.1:5000/api/swimmers")
  .then(res => res.json())
  .then(data => {
    swimmers = data;
    render(swimmers);
  });

function render(list) {
  results.innerHTML = "";

  list.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>
        <a href="swimmer.html?id=${s.id}">
          ${s.name}
        </a>
      </h2>
      <p>${s.club} (${s.year})</p>
      <p>ID: ${s.id}</p>
    `;

    results.appendChild(div);
  });
}

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  render(swimmers.filter(s => s.name.toLowerCase().includes(q)));
});
</script>

</body>
</html>
